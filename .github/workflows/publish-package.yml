name: Publish package

on:
    push:
        branches:
            - main
        paths:
            - package/package.json

permissions:
    contents: read

concurrency:
    group: publish-package
    cancel-in-progress: false

jobs:
    publish:
        environment: ZVSUIKIT_ENV
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Check package version change
              id: version
              env:
                  BEFORE_SHA: ${{ github.event.before }}
              run: |
                  git show "${BEFORE_SHA}:package/package.json" > "${RUNNER_TEMP}/previous-package.json"

                  previous_version=$(node --print "require(process.env.RUNNER_TEMP + '/previous-package.json').version")
                  current_version=$(node --print "require('./package/package.json').version")

                  echo "Previous version: ${previous_version}"
                  echo "Current version: ${current_version}"

                  if [ "${previous_version}" = "${current_version}" ]; then
                    echo "changed=false" >> "${GITHUB_OUTPUT}"
                  else
                    echo "changed=true" >> "${GITHUB_OUTPUT}"
                  fi

            - name: Setup Node.js
              if: steps.version.outputs.changed == 'true'
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  registry-url: https://registry.npmjs.org
                  cache: npm

            - name: Remove deprecated npm config
              if: steps.version.outputs.changed == 'true'
              shell: bash
              run: sed -i '/^always-auth=/d' "${NPM_CONFIG_USERCONFIG}"

            - name: Verify npm authentication
              if: steps.version.outputs.changed == 'true'
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: |
                  if [ -z "${NODE_AUTH_TOKEN}" ]; then
                    echo "::error::Repository secret NPM_TOKEN is not configured."
                    exit 1
                  fi

                  npm whoami --registry=https://registry.npmjs.org

            - name: Install dependencies
              if: steps.version.outputs.changed == 'true'
              run: npm ci

            - name: Build package
              if: steps.version.outputs.changed == 'true'
              run: npm run build:package

            - name: Publish package
              if: steps.version.outputs.changed == 'true'
              run: npm publish --workspace=package
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
